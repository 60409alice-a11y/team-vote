<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>團隊互動投票網站</title>
  <style>
    :root{--bg:#fbf7ef;--card:#fff;--ink:#2b2118;--muted:#7b6d5e;--line:#eadfce;--gold:#a96715;--gold2:#d8b07d;--green:#15803d;--red:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:radial-gradient(circle at top,#fffaf1,var(--bg));color:var(--ink)}header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.bar{max-width:1120px;margin:auto;height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.brand{font-family:Georgia,"Noto Serif TC",serif;font-weight:700;font-size:22px;color:var(--gold)}nav{display:flex;gap:8px;align-items:center}.nav{border:0;background:transparent;padding:10px 14px;border-radius:10px;color:var(--muted);font-weight:700;cursor:pointer}.nav.active,.btn.primary{background:linear-gradient(135deg,var(--gold),#7e4810);color:white}.user{font-size:14px;color:var(--muted)}main{max-width:1120px;margin:0 auto;padding:44px 22px 80px}.hero{text-align:center;padding:110px 0 70px}.pill{display:inline-flex;gap:8px;border:1px solid var(--line);border-radius:999px;background:white;padding:8px 16px;color:var(--muted)}h1{font-family:Georgia,"Noto Serif TC",serif;font-size:clamp(42px,7vw,76px);line-height:1.18;margin:28px 0 18px}h1 .gold{color:var(--gold)}.lead{font-size:20px;color:var(--muted);line-height:1.8}.actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:30px}.btn{border:1px solid var(--line);background:white;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer;color:var(--ink)}.btn:disabled{opacity:.45;cursor:not-allowed}.grid{display:grid;gap:18px}.features{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));margin:42px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(92,64,23,.08);padding:22px}.feature{text-align:center}.emoji{font-size:34px}.muted{color:var(--muted)}.section-title{font-family:Georgia,"Noto Serif TC",serif;font-size:32px;margin:0 0 10px}.row{display:flex;gap:12px;align-items:center;justify-content:space-between}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:24px 0}.tab{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:800}.tab.active{background:var(--gold);color:white}.candidate-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.candidate{border:2px solid var(--line);background:white;border-radius:16px;padding:16px;text-align:center;cursor:pointer}.candidate.selected{border-color:var(--gold);background:#fff8eb}.avatar{width:46px;height:46px;border-radius:999px;margin:0 auto 10px;background:#a96715;color:white;display:grid;place-items:center;font-weight:900}.field{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;background:white}textarea.field{min-height:100px;resize:vertical}.question{margin-bottom:18px}.status{display:inline-block;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;background:#dcfce7;color:var(--green)}.barline{height:12px;background:#f0e4d2;border-radius:999px;overflow:hidden}.barfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}.rank{display:grid;grid-template-columns:34px 90px 1fr 80px;gap:10px;align-items:center;margin:12px 0}.wall{columns:1;column-gap:18px}.note{break-inside:avoid;margin:0 0 18px}.admin-grid{grid-template-columns:1fr 1fr}.form{display:grid;gap:10px;margin-bottom:18px}.list{display:grid;gap:12px}.item{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}.tools{display:flex;gap:6px}.iconbtn{border:0;background:#fff7ed;border-radius:10px;padding:8px;cursor:pointer}.danger{color:var(--red)}footer{text-align:center;color:var(--muted);border-top:1px solid var(--line);padding:24px}.hidden{display:none}@media(max-width:760px){.bar{height:auto;align-items:flex-start;gap:10px;flex-direction:column;padding:14px 18px}nav{overflow:auto;width:100%}.hero{padding-top:54px}.admin-grid{grid-template-columns:1fr}.rank{grid-template-columns:28px 70px 1fr 68px}.wall{columns:1}}
  </style>
</head>
<body>
  <header><div class="bar"><div class="brand">✨ 6月線上月會</div><nav id="nav"></nav><div class="user">本機預覽管理員</div></div></header>
  <main id="app"></main><footer>✨ 團隊互動投票與感謝牆 · 讓每份認可都有意義</footer>
  <script>
    const defaults={questions:[{id:1,emoji:'🥰',title:'最可愛成員',description:'誰是團隊中最讓人心情愉悅、充滿活力的成員？',sortOrder:1,isActive:true},{id:2,emoji:'🏆',title:'最優秀成員',description:'誰在工作上表現最突出、最令人印象深刻？',sortOrder:2,isActive:true},{id:3,emoji:'😂',title:'最好笑成員',description:'誰總是能讓大家開懷大笑、帶來歡樂？',sortOrder:3,isActive:true},{id:4,emoji:'💪',title:'最靠譜成員',description:'誰是最值得信賴、交辦任務最放心的人？',sortOrder:4,isActive:true}],candidates:[{id:1,name:'小明',description:'後端工程師，熱愛程式碼',sortOrder:1,isActive:true},{id:2,name:'小美',description:'前端設計師，品味獨特',sortOrder:2,isActive:true},{id:3,name:'小華',description:'專案管理師，穩定可靠',sortOrder:3,isActive:true},{id:4,name:'小安',description:'行銷企劃，點子很多',sortOrder:4,isActive:true}],votes:[],thanks:[{id:1,authorName:'玟涵',targetName:'全體夥伴',emoji:'💌',message:'謝謝大家把每個小週末都變得很有溫度，今天也要大聲說出感謝！',createdAt:new Date().toISOString()}]};
    const load=()=>JSON.parse(localStorage.teamVoteData||JSON.stringify(defaults)); const save=d=>localStorage.teamVoteData=JSON.stringify(d); let data=load(), page=location.hash.slice(1)||'home';
    const $=s=>document.querySelector(s); const sort=a=>[...a].sort((x,y)=>x.sortOrder-y.sortOrder||x.id-y.id); const activeQ=()=>sort(data.questions.filter(x=>x.isActive)); const activeC=()=>sort(data.candidates.filter(x=>x.isActive)); const uid='preview-user';
    function setPage(p){page=p;location.hash=p;render()} window.onhashchange=()=>{page=location.hash.slice(1)||'home';render()};
    function nav(){const links=[['home','首頁'],['vote','投票'],['results','結果'],['thanks','感謝牆'],['admin','管理']];$('#nav').innerHTML=links.map(([id,t])=>`<button class="nav ${page==id?'active':''}" onclick="setPage('${id}')">${t}</button>`).join('')}
    function shell(html){$('#app').innerHTML=html;nav()}
    function home(){shell(`<section class="hero"><div class="pill">☆ 宇媃 & 玟涵</div><h1><span class="gold">人資小週末6月線上月會</span><br>—聽我說謝謝尼！</h1><p class="lead">為您最欣賞的團隊成員投票，並留下真摯的感謝話語。<br>讓每一份認可都成為彼此前進的動力。</p><div class="actions"><button class="btn primary" onclick="setPage('vote')">開始投票</button><button class="btn" onclick="setPage('results')">查看投票結果</button></div></section><section class="grid features">${activeQ().map(q=>`<div class="card feature"><div class="emoji">${q.emoji}</div><h3>${q.title}</h3><p class="muted">${q.description}</p></div>`).join('')}</section><section class="card feature"><div class="emoji">💌</div><h2>小週末感謝牆</h2><p class="muted">平常沒機會說出口的感謝，就在今天說出來吧！</p><button class="btn primary" onclick="setPage('thanks')">前往感謝牆</button></section>`)}
    function vote(){const qs=activeQ(), cs=activeC(), done=data.votes.filter(v=>v.userId==uid).length;shell(`<h2 class="section-title">投票頁面</h2><p class="muted">每道題目限投一次，請謹慎選擇。已完成 ${done}/${qs.length}</p>${qs.map(q=>{const old=data.votes.find(v=>v.userId==uid&&v.questionId==q.id);return `<section class="card question"><div class="row"><div><span class="status">進行中</span><h2>${q.emoji} ${q.title}</h2><p class="muted">${q.description}</p></div></div>${old?`<p>你已投給 <b>${(data.candidates.find(c=>c.id==old.candidateId)||{}).name}</b></p><p class="muted">原因：${old.reason}</p>`:`<div class="candidate-grid">${cs.map(c=>`<button class="candidate" data-q="${q.id}" data-c="${c.id}" onclick="pick(this)"><div class="avatar">${c.name[0]}</div><b>${c.name}</b><p class="muted">${c.description||''}</p></button>`).join('')}</div><p><textarea class="field" id="r${q.id}" placeholder="投票原因 *"></textarea></p><button class="btn primary" onclick="submitVote(${q.id})">確認投票</button>`}</section>`}).join('')}`)}
    function pick(el){document.querySelectorAll(`[data-q="${el.dataset.q}"]`).forEach(x=>x.classList.remove('selected'));el.classList.add('selected')} function submitVote(qid){const picked=document.querySelector(`[data-q="${qid}"].selected`), reason=$(`#r${qid}`).value.trim(); if(!picked||!reason)return alert('請選擇成員並填寫原因'); data.votes.push({id:Date.now(),userId:uid,questionId:qid,candidateId:+picked.dataset.c,reason,createdAt:new Date().toISOString()});save(data);vote()}
    function results(){const qs=activeQ();shell(`<div class="row"><div><h2 class="section-title">投票結果</h2><p class="muted">即時更新的投票統計圖表</p></div><button class="btn" onclick="render()">重新整理</button></div>${qs.map(q=>{const rows=activeC().map(c=>({candidate:c,count:data.votes.filter(v=>v.questionId==q.id&&v.candidateId==c.id).length}));const total=rows.reduce((s,r)=>s+r.count,0),max=Math.max(1,...rows.map(r=>r.count));return `<section class="card question"><h2>${q.emoji} ${q.title}</h2><p class="muted">共 ${total} 票</p>${rows.sort((a,b)=>b.count-a.count).map((r,i)=>`<div class="rank"><b>${i+1}</b><span>${r.candidate.name}</span><div class="barline"><div class="barfill" style="width:${r.count/max*100}%"></div></div><span>${r.count} 票</span></div>`).join('')||'<p>尚無資料</p>'}</section>`}).join('')}`)}
    function thanks(){shell(`<h2 class="section-title">💌 感謝牆</h2><p class="muted">寫下您對團隊成員的感謝與祝福。</p><section class="card form"><input class="field" id="target" placeholder="感謝對象 *"><textarea class="field" id="msg" placeholder="感謝內容 *"></textarea><button class="btn primary" onclick="postThanks()">送出感謝</button></section><section class="wall">${data.thanks.map((m,i)=>`<article class="card note"><div class="row"><b>${m.authorName} 送給 ${m.targetName}</b><span class="emoji">${m.emoji}</span></div><p>${m.message}</p><p class="muted">${new Date(m.createdAt).toLocaleString('zh-TW')}</p></article>`).join('')}</section>`)} function postThanks(){const t=$('#target').value.trim(),m=$('#msg').value.trim();if(!t||!m)return alert('請填寫感謝對象與內容');data.thanks.unshift({id:Date.now(),authorName:'本機預覽管理員',targetName:t,emoji:'💌',message:m,createdAt:new Date().toISOString()});save(data);thanks()}
    function admin(){shell(`<h2 class="section-title">管理員後台</h2><p class="muted">管理投票題目、候選成員與排序設定</p><div class="grid admin-grid"><section><h2>🗳️ 投票題目管理</h2><div class="card form"><input id="qt" class="field" placeholder="題目標題 *"><input id="qe" class="field" placeholder="Emoji"><textarea id="qd" class="field" placeholder="題目描述"></textarea><button class="btn primary" onclick="addQ()">新增題目</button></div><div class="list">${sort(data.questions).map(q=>`<div class="card item"><div><b>${q.emoji} ${q.title}</b><p class="muted">${q.description}</p><span class="status">${q.isActive?'啟用':'停用'} · 排序 ${q.sortOrder}</span></div><div class="tools"><button class="iconbtn" onclick="toggleQ(${q.id})">👁</button><button class="iconbtn danger" onclick="delQ(${q.id})">🗑</button></div></div>`).join('')}</div></section><section><h2>👥 候選成員管理</h2><div class="card form"><input id="cn" class="field" placeholder="成員姓名 *"><input id="cd" class="field" placeholder="職稱或描述"><button class="btn primary" onclick="addC()">新增成員</button></div><div class="list">${sort(data.candidates).map(c=>`<div class="card item"><div><b>${c.name}</b><p class="muted">${c.description}</p><span class="status">${c.isActive?'啟用':'停用'} · 排序 ${c.sortOrder}</span></div><div class="tools"><button class="iconbtn" onclick="toggleC(${c.id})">👁</button><button class="iconbtn danger" onclick="delC(${c.id})">🗑</button></div></div>`).join('')}</div></section></div>`)}
    function addQ(){const t=$('#qt').value.trim();if(!t)return;data.questions.push({id:Date.now(),title:t,emoji:$('#qe').value.trim()||'✨',description:$('#qd').value.trim(),sortOrder:data.questions.length+1,isActive:true});save(data);admin()} function addC(){const n=$('#cn').value.trim();if(!n)return;data.candidates.push({id:Date.now(),name:n,description:$('#cd').value.trim(),sortOrder:data.candidates.length+1,isActive:true});save(data);admin()} function toggleQ(id){let x=data.questions.find(q=>q.id==id);x.isActive=!x.isActive;save(data);admin()} function toggleC(id){let x=data.candidates.find(c=>c.id==id);x.isActive=!x.isActive;save(data);admin()} function delQ(id){if(confirm('確定刪除？')){data.questions=data.questions.filter(q=>q.id!=id);save(data);admin()}} function delC(id){if(confirm('確定刪除？')){data.candidates=data.candidates.filter(c=>c.id!=id);save(data);admin()}}
    function render(){({home,vote,results,thanks,admin}[page]||home)()} render();
  </script>
</body>
</html>
